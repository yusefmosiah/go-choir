commands:
  install: go mod download && cd frontend && pnpm install --frozen-lockfile
  build: go build ./cmd/...
  test: go test ./... -count=1 -p 4
  vet: go vet ./...
  frontend-build: cd frontend && pnpm build
  playwright-install: cd frontend && pnpm exec playwright install chromium
  frontend-e2e: cd frontend && pnpm exec playwright test --workers=1
  nix-eval: nix flake show .
  public-smoke: curl -sf https://draft.choir-ip.com
  deploy-provider-creds: ./nix/deploy-provider-creds.sh

services:
  auth:
    start: AUTH_PORT=8081 AUTH_RP_ID="localhost" AUTH_RP_ORIGINS="http://localhost:4173" AUTH_ACCESS_TOKEN_TTL="5m" AUTH_REFRESH_TOKEN_TTL="720h" AUTH_COOKIE_SECURE="false" go run ./cmd/auth
    stop: lsof -ti :8081 | xargs kill 2>/dev/null || true
    healthcheck: curl -sf http://127.0.0.1:8081/health
    port: 8081
    depends_on: []

  proxy:
    start: PROXY_PORT=8082 PROXY_SANDBOX_URL="http://127.0.0.1:8085" PROXY_VMCTL_URL="http://127.0.0.1:8083" go run ./cmd/proxy
    stop: lsof -ti :8082 | xargs kill 2>/dev/null || true
    healthcheck: curl -sf http://127.0.0.1:8082/health
    port: 8082
    depends_on: [auth, sandbox, vmctl]

  vmctl:
    start: VMCTL_PORT=8083 VMCTL_SANDBOX_URL_BASE="http://127.0.0.1:8085" VMCTL_IDLE_TIMEOUT="30m" go run ./cmd/vmctl
    stop: lsof -ti :8083 | xargs kill 2>/dev/null || true
    healthcheck: curl -sf http://127.0.0.1:8083/health
    port: 8083
    depends_on: []

  gateway:
    start: GATEWAY_PORT=8084 go run ./cmd/gateway
    stop: lsof -ti :8084 | xargs kill 2>/dev/null || true
    healthcheck: curl -sf http://127.0.0.1:8084/health
    port: 8084
    depends_on: []

  sandbox:
    start: SANDBOX_PORT=8085 SANDBOX_ID="sandbox-dev" go run ./cmd/sandbox
    stop: lsof -ti :8085 | xargs kill 2>/dev/null || true
    healthcheck: curl -sf http://127.0.0.1:8085/health
    port: 8085
    depends_on: []
    # When routing through the gateway (VM mode), set:
    #   RUNTIME_GATEWAY_URL=http://127.0.0.1:8084
    #   RUNTIME_GATEWAY_TOKEN=<sandbox-credential-token>
    # Or just set PROXY_VMCTL_URL and the sandbox will use it as fallback.

  frontend:
    start: cd frontend && pnpm dev --host localhost --port 4173
    stop: lsof -ti :4173 | xargs kill 2>/dev/null || true
    healthcheck: curl -sf http://localhost:4173
    port: 4173
    depends_on: [auth, proxy]
